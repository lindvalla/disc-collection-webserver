<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Search Filter</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #search-input { width: 300px; padding: 8px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Search and Filter Data</h1>

    <input type="text" id="search-input" placeholder="Type to filter...">

    <table id="data-table">
        <thead>
            <tr>
                <!-- Assuming you know your column headers or want generic ones -->
                <th>Num</th>
                <th>Disc</th>
                <th>Title</th>
                <th>Orig Title</th>
                <!-- Add more <th> for more columns as needed -->
            </tr>
        </thead>
        <tbody>
            <!-- Data will be inserted here by JavaScript or Flask initially -->
            {% for item in items %}
                <tr>
                    {% for cell in item %}
                        <td>{{ cell|safe }}</td>
                    {% endfor %}
                </tr>
            {% endfor %}
        </tbody>
    </table>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
