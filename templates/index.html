<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Search Filter</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #search-input { width: 300px; padding: 8px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }

        /* Styling for the Upload Button */
        .upload-btn {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
        }

        /* Spinner Styles (Hidden by default) */
        .spinner-container {
            display: none;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>Search and Filter Data</h1>

    <input type="text" id="search-input" placeholder="Type to filter...">
    <!--<fieldset>
        <legend>What to hide</legend>
        <div>
            <input type="checkbox" id="hidedvd" name="hidedvd" checked>
            <label for="hidedvd">Hide DVD</label>
        </div>
        <div>
            <input type="checkbox" id="hidebluray" name="hidebluray">
            <label for="hidebluray">Hide BluRay</label>
        </div>
        <div>
            <input type="checkbox" id="hide4k" name="hide4k">
            <label for="hide4k">Hide 4K</label>
        </div>
    </fieldset>-->

    <!-- Single Button UI: The label acts as the button, hiding the default input look -->
    <label id="uploadLabel" for="fileInput" class="upload-btn">
        Upload New Data
    </label>
    <input type="file" id="fileInput" onchange="autoUploadFile()" accept=".xml" style="display: none;">

    <!-- Loading Spinner Element -->
    <div id="loadingSpinner" class="spinner-container">
        <div class="spinner"></div>
        <span>Processing data, please wait...</span>
    </div>

    <table id="data-table">
        <thead>
            <tr>
                <!-- Assuming you know your column headers or want generic ones -->
                <th><a href="/search?sort=Num">Num</a></th>
                <!--<th>DVD</th>
                <th>BD</th>
                <th>4K</th>-->
                <th>Disc</th>
                <th><a href="/search?sort=Title">Title</a></th>
                <th>Orig Title</th>
                <!-- Add more <th> for more columns as needed -->
            </tr>
        </thead>
        <tbody>
            <!-- Data will be inserted here by JavaScript or Flask initially -->
            {% for item in items %}
                <tr>
                    {% for cell in item %}
                        <td>{{ cell|safe }}</td>
                    {% endfor %}
                </tr>
            {% endfor %}
        </tbody>
    </table>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
